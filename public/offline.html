<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seminario DCI - Sin Conexión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #b91c1c;
      font-size: 24px;
      margin-bottom: 10px;
    }
    
    .icon {
      font-size: 60px;
      margin: 20px 0;
    }
    
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .status {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }
    
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .button {
      background: #b91c1c;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .button:hover {
      background: #991b1b;
      transform: translateY(-2px);
    }
    
    .info {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/images/logo.png" alt="Logo" class="logo">
    <h1>Seminario DCI</h1>
    
    <div class="icon">📡</div>
    
    <div class="status">
      <span class="status-dot"></span>
      Sin conexión a internet
    </div>
    
    <p>
      Parece que no tienes conexión a internet. 
      <strong>Tus datos se han guardado localmente</strong> y se sincronizarán automáticamente cuando vuelva la conexión.
    </p>
    
    <button class="button" onclick="location.reload()">
      🔄 Reintentar
    </button>
    
    <p class="info">
      Los cambios que hiciste sin conexión se guardarán automáticamente cuando vuelvas a estar online.
    </p>
  </div>
  
  <script>
    // Intentar reconectar automáticamente
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
